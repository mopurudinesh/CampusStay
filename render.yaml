services:
  - type: web
    name: campusstay-hostel
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn campusstay.wsgi"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: campusstay-db
          property: connectionString

databases:
  - name: campusstay-db
    plan: free
