{% extends 'base.html' %}

{% block title %}Forgot Password – CampusStay{% endblock %}

{% block content %}
<div class="row align-items-center justify-content-center min-vh-80 py-5 slide-up">
    <div class="col-12 col-md-8 col-lg-5">
        <div class="glass-card">
            <h2 class="fw-bold mb-3 text-center">Recover Password</h2>
            <p class="text-secondary text-center mb-4">Enter your registered email address to receive recovery instructions</p>
            
            <form id="forgot-form">
                {% csrf_token %}
                <div class="mb-4">
                    <label for="email" class="form-label">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0"><i class="fa-solid fa-envelope"></i></span>
                        <input type="email" class="form-control border-start-0" id="email" required placeholder="Enter your email">
                    </div>
                </div>
                
                <button type="submit" class="btn btn-glass-primary w-100 py-3 d-flex align-items-center justify-content-center" id="forgot-submit-btn">
                    <span>Send Reset Instructions</span>
                    <div class="spinner-border spinner-border-sm text-light ms-2 d-none" id="forgot-spinner" role="status"></div>
                </button>
            </form>
            
            <div class="text-center mt-4">
                <a href="{% url 'page_login' %}" class="text-primary text-decoration-none fw-semibold">Back to Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const sidebar = document.getElementById("sidebar-panel");
        const main = document.getElementById("main-container");
        if (sidebar) sidebar.classList.add("d-none");
        if (main) main.className = "col-12 p-4 main-content";

        const form = document.getElementById("forgot-form");
        const submitBtn = document.getElementById("forgot-submit-btn");
        const spinner = document.getElementById("forgot-spinner");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            
            submitBtn.disabled = true;
            spinner.classList.remove("d-none");
            
            const email = document.getElementById("email").value.trim();

            try {
                const response = await fetch("/api/auth/forgot-password/", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();
                
                if (response.ok) {
                    showToast(data.message, "success");
                    form.reset();
                } else {
                    showToast(data.detail || "Error occurred.", "error");
                }
            } catch (error) {
                showToast("Network error. Reset link could not be sent.", "error");
            } finally {
                submitBtn.disabled = false;
                spinner.classList.add("d-none");
            }
        });
    });
</script>
{% endblock %}
